<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Generator CV</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container">
        <h2>Formularz CV</h2>

        {% if errors %}
        <div class="error-box">
            <ul>
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
            </ul>
        </div>
        {% endif %}

        <form action="/generator" method="POST">
            <label for="fullname">Imię i nazwisko:</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="email">Email:</label>
            <input type="text" id="email" name="email" required>

            <label for="github">Link do GitHub:</label>
            <input type="url" id="github" name="github">

            <label for="position">Stanowisko:</label>
            <input type="text" id="position" name="position" required>

            <label for="skills">Umiejętności (oddzielone przecinkami):</label>
            <input type="text" id="skills" name="skills" required>

            <label for="experience">Doświadczenie (opis):</label>
            <textarea id="experience" name="experience" rows="5" required></textarea>

            <button type="submit">Generuj CV</button>
        </form>
    </div>
</body>

</html>
